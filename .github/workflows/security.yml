name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit hatchling
      - name: Audit API dependencies
        run: cd apps/api && pip install -e . && pip-audit
        continue-on-error: true
      - name: Audit Agent dependencies
        run: cd apps/agents && pip install -e . && pip-audit
        continue-on-error: true

  docker-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t hexstrike-api:test apps/api/
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hexstrike-api:test
          severity: "CRITICAL,HIGH"
          exit-code: "0"
